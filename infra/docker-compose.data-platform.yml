services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vinted
      POSTGRES_PASSWORD: vinted
      POSTGRES_DB: vinted_radar
    ports:
      - "5432:5432"
    volumes:
      - data-platform-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinted -d vinted_radar"]
      interval: 10s
      timeout: 5s
      retries: 8

  clickhouse:
    image: clickhouse/clickhouse-server:25.1
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: vinted_radar
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - data-platform-clickhouse:/var/lib/clickhouse
      - data-platform-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - data-platform-minio:/data

volumes:
  data-platform-postgres:
  data-platform-clickhouse:
  data-platform-clickhouse-logs:
  data-platform-minio:
